<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#16a34a">

  <!-- iOS Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PWA Trial">

  <title>Sandesh Karki - Roast Portfolio</title>

  <!-- Manifest for PWA -->
  <link rel="manifest" href="./manifest.json">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="./image/192.png">
  <link rel="icon" type="image/png" href="./image/192.png">

  <style>
    body {
      font-family: 'Comic Sans MS', 'Arial Black', sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #installBtn {
      display: none;
      padding: 10px 20px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-bottom: 20px;
    }

    #installBtn:hover {
      background: #15803d;
      transform: scale(1.1);
    }

    .funny-card {
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 500px;
      border: 5px dashed #16a34a;
      transform: rotate(-2deg);
      animation: bounce 3s infinite;
      margin-bottom: 30px;
    }

    .funny-card img {
      width: 100%;
      max-width: 300px;
      border-radius: 10px;
      margin-bottom: 20px;
      filter: drop-shadow(5px 5px 0px #16a34a);
    }

    .funny-card h1 {
      font-size: 2.5em;
      color: #764ba2;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 3px;
      animation: wiggle 0.5s infinite;
    }

    .button-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
    }

    .fun-btn {
      padding: 12px 25px;
      font-size: 16px;
      border: 3px solid #16a34a;
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
      transition: all 0.3s;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      font-family: 'Comic Sans MS', sans-serif;
    }

    .fun-btn:hover {
      transform: scale(1.15) rotate(5deg);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      background: linear-gradient(135deg, #15803d, #16a34a);
    }

    .fun-btn:active {
      transform: scale(0.95);
    }

    .fun-btn.about {
      background: linear-gradient(135deg, #764ba2, #667eea);
      border-color: #764ba2;
    }

    .fun-btn.about:hover {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .fun-btn.contact {
      background: linear-gradient(135deg, #f97316, #f87171);
      border-color: #f97316;
    }

    .fun-btn.contact:hover {
      background: linear-gradient(135deg, #f87171, #f97316);
    }

    .fun-btn.social {
      background: linear-gradient(135deg, #ec4899, #f43f5e);
      border-color: #ec4899;
    }

    .fun-btn.social:hover {
      background: linear-gradient(135deg, #f43f5e, #ec4899);
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(-2deg) translateY(0); }
      50% { transform: rotate(2deg) translateY(-10px); }
    }

    @keyframes wiggle {
      0%, 100% { transform: skewX(-5deg); }
      50% { transform: skewX(5deg); }
    }
  </style>
</head>
<body>



  <div class="funny-card">
    <img src="./image/san.jpeg" alt="Funny Meme">
    <h1>Sandesh Mai Key chodey</h1>
  </div>

  <div class="button-group">
    <button class="fun-btn about" onclick="location.href='about.html'">👨‍💻 About Me</button>
    <button class="fun-btn contact" onclick="location.href='mailto:contact@example.com'">📧 Email</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
