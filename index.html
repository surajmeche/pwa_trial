<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#16a34a">

  <!-- iOS Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PWA Trial">

  <title>PWA Trial</title>

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Icon -->
  <link rel="apple-touch-icon" href="image/192.png">

  <style>
    body {
      font-family: 'Comic Sans MS', 'Arial Black', sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #installBtn {
      display: none;
      padding: 10px 20px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-bottom: 20px;
    }

    #installBtn:hover {
      background: #15803d;
      transform: scale(1.1);
    }

    .funny-card {
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 500px;
      border: 5px dashed #16a34a;
      transform: rotate(-2deg);
      animation: bounce 3s infinite;
    }

    .funny-card img {
      width: 100%;
      max-width: 300px;
      border-radius: 10px;
      margin-bottom: 20px;
      filter: drop-shadow(5px 5px 0px #16a34a);
    }

    .funny-card h1 {
      font-size: 2.5em;
      color: #764ba2;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 3px;
      animation: wiggle 0.5s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(-2deg) translateY(0); }
      50% { transform: rotate(2deg) translateY(-10px); }
    }

    @keyframes wiggle {
      0%, 100% { transform: skewX(-5deg); }
      50% { transform: skewX(5deg); }
    }
  </style>
</head>
<body>

  <button id="installBtn">📲 Install App</button>

  <div class="funny-card">
    <img src="./image/san.jpeg" alt="Funny Meme">
    <h1>Sandesh Mai Key chodey</h1>
  </div>

  <script src="script.js"></script>
</body>
</html>
